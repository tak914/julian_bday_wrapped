<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Birthday Wrapped ✨</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--c1:#00e5ff;--c2:#7c3aed;}
html,body{width:100%;height:100%;overflow:hidden;background:#020b1a;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;user-select:none;-webkit-user-select:none;}

/* ── Contenedor raíz ── */
#app{position:fixed;inset:0;overflow:hidden;touch-action:none;}

/* ── Fondo ── */
#bg{position:absolute;inset:0;background:
  radial-gradient(ellipse at 15% 15%,rgba(0,120,220,.28) 0%,transparent 55%),
  radial-gradient(ellipse at 85% 85%,rgba(124,58,237,.22) 0%,transparent 55%),
  #020b1a;z-index:0;}

/* ── Barra de progreso ── */
#progress-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;gap:4px;padding:12px 14px;}
.prog-seg{flex:1;height:3px;border-radius:99px;background:rgba(255,255,255,.15);overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;background:#fff;width:0%;transition:width .12s linear;}

/* ── Slides wrapper ── */
#slides-wrapper{position:absolute;inset:0;z-index:10;}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;
  opacity:0;pointer-events:none;transform:translateY(40px) scale(.97);transition:opacity .42s ease,transform .42s ease;}
.slide.active{opacity:1;pointer-events:auto;transform:translateY(0) scale(1);}
.slide.exit-up{opacity:0;transform:translateY(-50px) scale(1.03);transition:opacity .35s ease,transform .35s ease;}
.slide.exit-down{opacity:0;transform:translateY(50px) scale(1.03);transition:opacity .35s ease,transform .35s ease;}

/* ── Glassmorphism card ── */
.glass{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:28px;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 8px 40px rgba(0,80,180,.25),inset 0 1px 0 rgba(255,255,255,.18);}

/* ── Orbs ── */
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.45;pointer-events:none;animation:orbPulse 8s ease-in-out infinite;}
@keyframes orbPulse{0%,100%{transform:scale(1);opacity:.35}50%{transform:scale(1.18);opacity:.55}}

/* ── Partículas suspenso ── */
.particle{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.3);animation:partFloat 2.5s ease-in-out infinite;}
@keyframes partFloat{0%,100%{transform:translateY(-10px);opacity:.15}50%{transform:translateY(10px);opacity:.7}}

/* ── Barra suspenso ── */
.suspense-bar-track{width:200px;height:2px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:8px;}
.suspense-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#00e5ff,#7c3aed,#f472b6);width:0%;}

/* ── Texto gradiente ── */
.grad-text{background:linear-gradient(135deg,#fff 25%,#00e5ff 65%,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.grad-stat{background:linear-gradient(135deg,#fff,var(--stat-c1,#00e5ff));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ── Imagen slide stats ── */
.stat-img-wrap{position:relative;width:100%;height:220px;overflow:hidden;border-radius:24px 24px 0 0;background:rgba(255,255,255,.04);}
.stat-img-wrap img{width:100%;height:100%;object-fit:cover;opacity:.6;}
.stat-img-wrap .emoji-over{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:5rem;}
.stat-img-wrap .img-fade{position:absolute;inset:0;background:linear-gradient(to top,rgba(2,11,26,.75),transparent 50%);}

/* ── Progress regalo ── */
.gift-bar-track{width:100%;height:12px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden;}
.gift-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#00e5ff,#7c3aed,#f472b6,#fbbf24);width:0%;transition:width .3s cubic-bezier(.34,1.56,.64,1);}

/* ── Confetti ── */
.confetti-piece{position:fixed;top:-20px;border-radius:2px;pointer-events:none;z-index:999;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}80%{opacity:1}100%{transform:translateY(115vh) rotate(720deg);opacity:0}}

/* ── Animaciones de entrada slide ── */
@keyframes popIn{0%{transform:scale(.75) translateY(30px);opacity:0}70%{transform:scale(1.04) translateY(-4px)}100%{transform:scale(1) translateY(0);opacity:1}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(22px)}100%{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{0%{opacity:0;transform:scale(0) rotate(-20deg)}70%{transform:scale(1.3) rotate(8deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes slideRight{0%{opacity:0;transform:translateX(-20px)}100%{opacity:1;transform:translateX(0)}}
@keyframes blink{0%,100%{opacity:.28}50%{opacity:.65}}
@keyframes bobble{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@keyframes starFloat{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-5px);opacity:1}}
@keyframes giftBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shake{0%,100%{transform:rotate(0)}15%{transform:rotate(-7deg)}30%{transform:rotate(7deg)}45%{transform:rotate(-5deg)}60%{transform:rotate(5deg)}75%{transform:rotate(-2deg)}90%{transform:rotate(2deg)}}
@keyframes cakeBob{0%,100%{transform:rotate(-4deg) scale(1)}50%{transform:rotate(4deg) scale(1.07)}}
@keyframes pulseText{0%,100%{transform:scale(.97);opacity:.6}50%{transform:scale(1.03);opacity:1}}
@keyframes barSegGrow{0%{width:0}100%{width:var(--seg-w,24px)}}

/* ── Botón audio ── */
#audio-btn{position:fixed;bottom:32px;right:24px;z-index:200;width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.2);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 4px 24px rgba(0,180,255,.28),inset 0 1px 0 rgba(255,255,255,.18);
  cursor:pointer;font-size:18px;color:#fff;display:flex;align-items:center;justify-content:center;
  transition:transform .15s;}
#audio-btn:active{transform:scale(.88);}

/* ── Indicador slide ── */
#slide-num{position:fixed;bottom:32px;left:24px;z-index:200;font-size:11px;color:rgba(255,255,255,.22);font-variant-numeric:tabular-nums;}

/* ── Scroll hint intro ── */
.scroll-hint{width:24px;height:40px;border-radius:99px;border:2px solid rgba(255,255,255,.25);display:flex;align-items:flex-start;justify-content:center;padding:4px;margin-top:16px;}
.scroll-dot{width:6px;height:12px;border-radius:99px;background:rgba(255,255,255,.45);animation:bobble 1.6s ease-in-out infinite;}

/* ── Utilidades ── */
.w-full{width:100%;} .max-w-sm{max-width:360px;} .flex{display:flex;} .flex-col{flex-direction:column;}
.items-center{align-items:center;} .justify-center{justify-content:center;} .gap-4{gap:16px;} .gap-2{gap:8px;} .gap-1{gap:4px;}
.p-6{padding:24px;} .p-8{padding:32px;} .pt-5{padding-top:20px;} .px-1{padding-left:4px;padding-right:4px;}
.mt-1{margin-top:4px;} .mt-2{margin-top:8px;} .mt-3{margin-top:12px;} .mb-1{margin-bottom:4px;} .mb-2{margin-bottom:8px;} .mb-3{margin-bottom:12px;}
.text-xs{font-size:11px;} .text-sm{font-size:13px;} .text-base{font-size:15px;} .text-lg{font-size:18px;} .text-2xl{font-size:22px;} .text-3xl{font-size:28px;} .text-6xl{font-size:56px;} .text-7xl{font-size:64px;} .text-8xl{font-size:72px;}
.font-light{font-weight:300;} .font-bold{font-weight:700;} .font-black{font-weight:900;}
.uppercase{text-transform:uppercase;} .italic{font-style:italic;}
.tracking-wide{letter-spacing:.05em;} .tracking-widest{letter-spacing:.15em;} .ls-ultra{letter-spacing:.32em;}
.leading-snug{line-height:1.3;} .leading-relaxed{line-height:1.6;}
.opacity-40{opacity:.4;} .opacity-45{opacity:.45;} .opacity-50{opacity:.5;} .opacity-55{opacity:.55;} .opacity-60{opacity:.6;}
.relative{position:relative;} .overflow-hidden{overflow:hidden;}
.justify-between{justify-content:space-between;}
</style>
</head>
<body>
<div id="app">
  <div id="bg"></div>
  <div id="progress-bar"></div>
  <div id="slides-wrapper"></div>
  <button id="audio-btn" onclick="toggleAudio()">▶</button>
  <div id="slide-num"></div>
  <audio id="audio" src="Mazzy Star - Fade Into You (Official Music Video).mp3" loop></audio>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════
const GIFT_TAPS = 50;
const SLIDE_MS  = 9000;
const SUSPENSE_MS = 5200; // tiempo de pantalla de suspenso (ms)

const SLIDES = [
  { suspense: null, type: 'intro' },
  { 
    suspense: { icon:'🥳', l1:'Hubo juntadas', l2:'que ningún reloj contó…' },
    type:'stats', emoji:'', title:'cantidad de juntadas', stat:'76',
    sub:'noches hablando al pedo, juntadas que dejan anecdotas, risas y momentos unicos',
    c1:'#00e5ff', c2:'#7c3aed', 
    img: 'foto1.jpg' 
  },
  { 
    suspense: { icon:'😂', l1:'Hubo un número', l2:'que no cabe en ninguna foto…' },
    type:'stats', emoji:'😂', title:'Risas contadas', stat:'+3.253',
    sub:'carcajadas, chistes compartidos y boludeces que solo nosotros entendemos',
    c1:'#fbbf24', c2:'#f472b6', 
    img:'/assets/foto2.jpg' // <-- Esta no tenía link, podés subirla a Postimages y cambiar el link aquí
  },
  { 
    suspense: { icon:'🗺️', l1:'Cada kilómetro', l2:'tiene una historia…' },
    type:'stats', emoji:'', title:'El dia que mas caminamos', stat:'7.4km',
    sub:'Fuimos a ver a miranda y caminamos un monton, 📍terminal parana -> 📍residencia -> 📍shopping -> 📍costanera -> 📍shopping(de nuevo) -> y despues... todo miranda',
    c1:'#34d399', c2:'#00bfff', 
    img: 'foto3.jpg' 
  },
  { 
    suspense: { icon:'🍕', l1:'Hubo comidas', l2:'que se volvieron rituales…' },
    type:'stats', emoji:'', title:'Comidas a medianoche', stat:'36',
    sub:'delivery, picadas, antojos y cenas que duraron tres horas',
    c1:'#fb923c', c2:'#ef4444', 
    img: 'foto4.jpg' 
  },
  { 
    suspense: { icon:'🎵', l1:'tambien nos unió otra cosa', l2:'MÚSICA' },
    type:'stats', emoji:'🎵', title:'Canciones en loop', stat:'ceiling figures',
    sub:'Poder hacer música con tu mejor amigo se siente como un privilegio que no muchos puedesn tener.',
    c1:'#a78bfa', c2:'#ec4899', 
    img: 'foto5.jpg' 
  },
  { 
    suspense: { icon:'💬', l1:'Algunas palabras', l2:'no se olvidan jamás…' },
    type:'quote',
    quote:'I don´t tell you this often but i apreciate you.',
    author:'Me lo dijiste vos.. (supongo, pq le pase el chat nuestro a una IA y me dijo que me dijiste eso..)',
    c1:'#a78bfa', c2:'#ec4899' 
  },
  { suspense: { icon:'🎬', l1:'Y hubo momentos', l2:'que quedaron grabados para siempre…' },
    type:'video' 
  },
  { suspense: { icon:'🎁', l1:'Pero lo mejor', l2:'todavía no llegó…' },
    type:'gift' 
  },
];const TOTAL = SLIDES.length;

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let cur = 0, showSuspense = false, progress = 0, paused = false, audioPlaying = false;
let timerID = null, suspenseTimerID = null;
let giftTaps = 0, giftExploded = false, giftDone = false;

// ══════════════════════════════════════════════════════
//  PROGRESS BAR
// ══════════════════════════════════════════════════════
function buildProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const seg = document.createElement('div');
    seg.className = 'prog-seg';
    const fill = document.createElement('div');
    fill.className = 'prog-fill';
    fill.id = `pf-${i}`;
    seg.appendChild(fill);
    bar.appendChild(seg);
  }
}
function updateProgressBar() {
  for (let i = 0; i < TOTAL; i++) {
    const el = document.getElementById(`pf-${i}`);
    if (!el) continue;
    if (i < cur) el.style.width = '100%';
    else if (i === cur) el.style.width = (showSuspense ? 0 : progress * 100) + '%';
    else el.style.width = '0%';
  }
}

// ══════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════
function startTimer() {
  clearInterval(timerID);
  // Agregamos la condición del video para que no avance solo por tiempo
  if (paused || SLIDES[cur].type === 'gift' || SLIDES[cur].type === 'video' || showSuspense) return;
  timerID = setInterval(() => {
    progress += 100 / SLIDE_MS;
    if (progress >= 1) { progress = 0; advance(); return; }
    updateProgressBar();
  }, 100);
}

// ══════════════════════════════════════════════════════
//  NAVEGACIÓN
// ══════════════════════════════════════════════════════
function goTo(idx, direction = 'forward') {
  if (idx < 0 || idx >= TOTAL) return;
  clearInterval(timerID);
  clearTimeout(suspenseTimerID);

  const oldSlide = document.querySelector('.slide.active');
  if (oldSlide) {
    oldSlide.classList.remove('active');
    oldSlide.classList.add(direction === 'forward' ? 'exit-up' : 'exit-down');
    setTimeout(() => oldSlide.classList.remove('exit-up','exit-down'), 400);
  }

  cur = idx;
  progress = 0;
  giftTaps = 0; giftExploded = false; giftDone = false;

  const target = SLIDES[cur];
  if (direction === 'forward' && target.suspense) {
    showSuspense = true;
    renderSuspense(target.suspense);
    updateProgressBar();
    document.getElementById('slide-num').textContent = `${cur + 1} / ${TOTAL}`;
    suspenseTimerID = setTimeout(() => {
      showSuspense = false;
      renderSlide(cur);
      startTimer();
    }, SUSPENSE_MS);
  } else {
    showSuspense = false;
    renderSlide(cur);
    startTimer();
  }
  updateProgressBar();
  document.getElementById('slide-num').textContent = `${cur + 1} / ${TOTAL}`;
}

function advance() { goTo(cur + 1, 'forward'); }
function back()    { goTo(cur - 1, 'backward'); }

// ══════════════════════════════════════════════════════
//  RENDER HELPERS
// ══════════════════════════════════════════════════════
function orb(w, x, y, color, delay) {
  return `<div class="orb" style="width:${w}px;height:${w}px;left:${x};top:${y};background:${color};animation-delay:${delay}s;animation-duration:${7+delay}s"></div>`;
}

function showSlide(el) {
  const wrap = document.getElementById('slides-wrapper');
  // remove old suspense/slide
  wrap.innerHTML = '';
  wrap.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('active')));
}

// ── Suspenso ──
function renderSuspense(data) {
  const d = document.createElement('div');
  d.className = 'slide';
  d.innerHTML = `
    ${orb(300,'-60px','8%','radial-gradient(circle,#00bfff,transparent)',0)}
    ${orb(240,'55%','45%','radial-gradient(circle,#7c3aed,transparent)',1)}
    ${[...Array(10)].map((_,i)=>`<div class="particle" style="left:${8+i*9}%;top:${15+(i%4)*20}%;animation-delay:${i*.18}s;animation-duration:${2.2+i*.25}s"></div>`).join('')}
    <div id="sus-icon" style="font-size:4.5rem;filter:drop-shadow(0 0 32px rgba(0,200,255,.75));animation:scaleIn .75s ease-out forwards;">${data.icon}</div>
    <div style="animation:fadeUp .6s .45s ease-out both;">
      <p style="font-size:22px;font-weight:300;opacity:.6;margin-bottom:8px;">${data.l1}</p>
      <p class="grad-text" style="font-size:28px;font-weight:900;">${data.l2}</p>
    </div>
    <div class="suspense-bar-track">
      <div class="suspense-bar-fill" id="sus-bar"></div>
    </div>
    <p style="font-size:10px;text-transform:uppercase;letter-spacing:.3em;opacity:.3;animation:blink 1.3s infinite;">cargando tu historia…</p>
  `;
  showSlide(d);
  // animar barra a lo largo de SUSPENSE_MS
  requestAnimationFrame(() => {
    const bar = document.getElementById('sus-bar');
    if (bar) {
      bar.style.transition = `width ${SUSPENSE_MS}ms ease-in-out`;
      requestAnimationFrame(() => { bar.style.width = '100%'; });
    }
  });
}

// ── Slide intro ──
function renderIntro() {
  const d = document.createElement('div');
  d.className = 'slide';
  d.innerHTML = `
    ${orb(320,'-80px','-60px','radial-gradient(circle,#00bfff,transparent)',0)}
    ${orb(270,'55%','50%','radial-gradient(circle,#7c3aed,transparent)',2)}
    ${orb(190,'25%','72%','radial-gradient(circle,#f472b6,transparent)',3)}
    <div style="font-size:4.5rem;filter:drop-shadow(0 0 28px rgba(0,200,255,.85));animation:scaleIn .7s .2s ease-out both;">✨</div>
    <div style="animation:fadeUp .6s .45s ease-out both;">
      <p class="uppercase ls-ultra opacity-45" style="font-size:14px;margin-bottom:12px;">20 años y amistad</p>
      <h1 class="grad-text" style="font-size:clamp(52px,15vw,72px);font-weight:900;line-height:1;filter:drop-shadow(0 0 40px rgba(0,200,255,.45));">Wrapped</h1>
      <p style="opacity:.35;margin-top:16px;font-size:13px;">Tocá el costado · Deslizá para avanzar</p>
    </div>
    <div class="scroll-hint"><div class="scroll-dot"></div></div>
  `;
  showSlide(d);
}

// ── Slide stats ──
function renderStats(s) {
  const d = document.createElement('div');
  d.className = 'slide';
  d.innerHTML = `
    ${orb(290,'-50px','5%',`radial-gradient(circle,${s.c1},transparent)`,0)}
    ${orb(230,'52%','52%',`radial-gradient(circle,${s.c2},transparent)`,1.5)}
    <div class="glass w-full max-w-sm overflow-hidden" style="animation:popIn .55s .1s ease-out both;">
      <div class="stat-img-wrap">
        <img src="${s.img}" onerror="this.style.display='none'" alt="">
        <div class="emoji-over" style="filter:drop-shadow(0 0 24px ${s.c1});">${s.emoji}</div>
        <div class="img-fade"></div>
      </div>
      <div class="p-6 pt-5" style="text-align:left;">
        <p class="uppercase tracking-widest opacity-40" style="font-size:11px;margin-bottom:4px;">${s.title}</p>
        <p class="grad-stat font-black" style="font-size:clamp(44px,12vw,60px);line-height:1;--stat-c1:${s.c1};animation:slideRight .5s .35s ease-out both;">${s.stat}</p>
        <p class="opacity-60 leading-relaxed" style="font-size:13px;margin-top:12px;animation:fadeUp .5s .5s ease-out both;">${s.sub}</p>
      </div>
    </div>
  `;
  showSlide(d);
}

// ── Slide quote ──
function renderQuote(s) {
  const d = document.createElement('div');
  d.className = 'slide';
  d.innerHTML = `
    ${orb(280,'-40px','15%',`radial-gradient(circle,${s.c1},transparent)`,0)}
    ${orb(220,'50%','50%',`radial-gradient(circle,${s.c2},transparent)`,1.5)}
    <div class="glass w-full max-w-sm p-8 flex flex-col gap-4" style="text-align:left;animation:popIn .55s .15s ease-out both;">
      <div style="font-size:3rem;filter:drop-shadow(0 0 20px ${s.c1});animation:scaleIn .5s .3s ease-out both;">💬</div>
      <p style="font-size:clamp(20px,5.5vw,26px);font-weight:700;line-height:1.3;
        background:linear-gradient(135deg,#fff,${s.c1});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        animation:fadeUp .5s .4s ease-out both;">"${s.quote}"</p>
      <p class="italic opacity-40" style="font-size:13px;animation:fadeUp .5s .7s ease-out both;">${s.author}</p>
      <div class="flex gap-1 mt-1">
        ${[s.c1,s.c2,'rgba(255,255,255,.35)'].map((c,i)=>`<div style="height:3px;border-radius:99px;background:${c};animation:barSegGrow .5s ${.85+i*.1}s ease-out both;--seg-w:${20+i*18}px;width:0"></div>`).join('')}
      </div>
    </div>
  `;
  showSlide(d);
}

// ── Slide video ──
// ── Slide video ──
function renderVideo() {
  const d = document.createElement('div');
  d.className = 'slide';
  d.innerHTML = `
    ${orb(300,'20%','-40px','radial-gradient(circle,#f472b6,transparent)',0)}
    ${orb(200,'-20px','55%','radial-gradient(circle,#00bfff,transparent)',2)}
    <div class="glass w-full max-w-sm p-6 flex flex-col items-center gap-4" style="animation:popIn .55s .1s ease-out both;">
      <div class="flex items-center gap-2">
        <span style="font-size:2rem;filter:drop-shadow(0 0 16px #f472b6);">🎬</span>
        <p class="uppercase tracking-widest opacity-45" style="font-size:11px;">El momento del año</p>
      </div>
      <div style="width:100%; border-radius:16px; overflow:hidden; background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center;" id="vid-wrap">
        <video 
          id="mi-video"
          src="video.mp4" 
          controls 
          playsinline 
          style="width:100%; border-radius:16px;">
        </video>
      </div>
      <p class="opacity-50 leading-relaxed" style="font-size:13px;">Ese momento que guardamos para siempre 🥳</p>
    </div>
  `;
  showSlide(d);

  // --- LÓGICA INTELIGENTE DEL VIDEO (CON HACK ANTIFREEZE) ---
  setTimeout(() => {
    const vid = document.getElementById('mi-video');
    const bgAudio = document.getElementById('audio');
    let videoTerminado = false; // Bandera de seguridad
    
    if (vid) {
      // 1. Cuando Julián le da Play al video, pausamos a Mazzy Star
      vid.addEventListener('play', () => {
        if (audioPlaying && bgAudio) {
          bgAudio.pause();
        }
      });

      // 2. EL HACK: Revisar el tiempo constantemente
      vid.addEventListener('timeupdate', () => {
        // Si el video arrancó y estamos a 0.4 segundos del final...
        if (vid.duration > 0 && vid.currentTime >= (vid.duration - 0.4)) {
          if (!videoTerminado) {
            videoTerminado = true;
            if (audioPlaying && bgAudio) bgAudio.play().catch(()=>{});
            advance(); // Forzamos el salto a la torta
          }
        }
      });

      // 3. Dejamos el evento normal por las dudas
      vid.addEventListener('ended', () => {
        if (!videoTerminado) {
          videoTerminado = true;
          if (audioPlaying && bgAudio) bgAudio.play().catch(()=>{});
          advance();
        }
      });
    }
  }, 50);
}

// ── Slide regalo ──
function renderGift() {
  giftTaps = 0; giftExploded = false; giftDone = false;
  const d = document.createElement('div');
  d.className = 'slide';
  d.id = 'slide-gift';
  d.innerHTML = `
    ${orb(340,'-70px','-50px','radial-gradient(circle,#fbbf24,transparent)',0)}
    ${orb(260,'48%','48%','radial-gradient(circle,#f472b6,transparent)',1.5)}
    <div id="gift-content" class="flex flex-col items-center gap-4 w-full max-w-sm">
      <div style="animation:fadeUp .5s ease-out both;">
        <p class="uppercase tracking-widest opacity-45" style="font-size:11px;letter-spacing:.3em;">El regalo</p>
        <h2 class="font-black" style="font-size:28px;margin-top:8px;">¿Te animás a abrirlo?</h2>
      </div>
      <div id="gift-box" onclick="tapGift()" style="cursor:pointer;animation:giftBob 2.2s ease-in-out infinite;">
        <div class="glass p-8 flex flex-col items-center gap-2" style="min-width:190px;">
          <div id="gift-emoji" style="font-size:4.5rem;filter:drop-shadow(0 0 12px rgba(251,191,36,.5));">🎁</div>
          <p class="opacity-35" style="font-size:11px;margin-top:4px;">¡Tocá para abrir!</p>
        </div>
      </div>
      <div class="w-full flex flex-col items-center gap-2">
        <div class="gift-bar-track"><div class="gift-bar-fill" id="gift-bar"></div></div>
        <div class="flex justify-between w-full px-1">
          <p class="opacity-40" style="font-size:11px;" id="gift-label">${GIFT_TAPS} toques más</p>
          <p class="opacity-40" style="font-size:11px;" id="gift-pct">0%</p>
        </div>
      </div>
      <p id="gift-hype" style="font-size:13px;font-weight:700;
        background:linear-gradient(135deg,#fbbf24,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        animation:pulseText .75s infinite;display:none;">¡Ya casi! ✨ ¡Seguí tocando!</p>
    </div>
    <div id="cake-content" style="display:none;" class="flex flex-col items-center gap-5 w-full max-w-xs text-center">
      <div class="glass p-8 flex flex-col items-center gap-5" style="animation:popIn .6s .2s ease-out both;">
        <div style="animation:cakeBob 2.6s ease-in-out infinite;">
          <img src="/assets/torta.png" alt="Torta" style="width:144px;height:144px;object-fit:contain;" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <div style="font-size:4.5rem;display:none;filter:drop-shadow(0 0 30px #fbbf24)">🎂</div>
        </div>
        <div style="animation:fadeUp .6s .5s ease-out both;">
          <p class="uppercase tracking-widest opacity-45" style="font-size:11px;margin-bottom:12px;">¡Feliz 20 años pa!</p>
          <p class="font-black leading-snug" style="font-size:22px;
            background:linear-gradient(135deg,#fff,#00e5ff,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
            Que este año sea tan especial como vos 💫</p>
          <p style="opacity:.38;margin-top:12px;font-size:13px;">Con todo el amor del mundo locura mix 🌊</p>
        </div>
        <div class="flex gap-1 mt-1">
          ${['⭐','🌟','✨','💛','✨','🌟','⭐'].map((s,i)=>`<span style="font-size:13px;animation:starFloat 1.6s ${i*.14}s ease-in-out infinite;">${s}</span>`).join('')}
        </div>
      </div>
    </div>
  `;
  showSlide(d);
  paused = true;
}

function tapGift() {
  if (giftExploded) return;
  giftTaps = Math.min(giftTaps + 1, GIFT_TAPS);
  const pct = Math.round(giftTaps / GIFT_TAPS * 100);
  const rem = GIFT_TAPS - giftTaps;

  // actualizar UI
  const bar = document.getElementById('gift-bar');
  if (bar) bar.style.width = pct + '%';
  const lbl = document.getElementById('gift-label');
  if (lbl) lbl.textContent = rem > 0 ? `${rem} toque${rem!==1?'s':''} más` : '¡Abriendo! 🎊';
  const pctEl = document.getElementById('gift-pct');
  if (pctEl) pctEl.textContent = pct + '%';

  // escala y brillo crecientes
  const box = document.getElementById('gift-box');
  const sc = 1 + (giftTaps / GIFT_TAPS) * 0.18;
  const glow = 12 + (giftTaps / GIFT_TAPS) * 35;
  if (box) { box.style.transform = `scale(${sc})`; box.style.animationName = 'none'; }
  const em = document.getElementById('gift-emoji');
  if (em) em.style.filter = `drop-shadow(0 0 ${glow}px rgba(251,191,36,${.45 + giftTaps/GIFT_TAPS * .55}))`;

  // shake visual
  if (box) {
    box.style.animation = 'shake .3s ease-out';
    setTimeout(()=>{ if(box){ box.style.animation = giftTaps < GIFT_TAPS ? 'giftBob 2.2s ease-in-out infinite' : 'none'; } }, 310);
  }

  // hype text
  const hype = document.getElementById('gift-hype');
  if (hype) hype.style.display = giftTaps >= Math.floor(GIFT_TAPS * .7) && giftTaps < GIFT_TAPS ? 'block' : 'none';

  if (giftTaps >= GIFT_TAPS && !giftExploded) {
    giftExploded = true;
    setTimeout(explodeGift, 80);
  }
}

function explodeGift() {
  const box = document.getElementById('gift-box');
  if (box) {
    box.style.transition = 'transform .45s ease-in, opacity .45s ease-in';
    box.style.transform = 'scale(2.2)';
    box.style.opacity = '0';
  }
  spawnConfetti();
  setTimeout(() => {
    const gc = document.getElementById('gift-content');
    const cc = document.getElementById('cake-content');
    if (gc) gc.style.display = 'none';
    if (cc) { cc.style.display = 'flex'; }
    giftDone = true;
  }, 900);
}

// ── Confetti ──
function spawnConfetti() {
  const colors = ['#00e5ff','#7c3aed','#f472b6','#fbbf24','#34d399','#fb923c'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const sz = 5 + Math.random() * 9;
    const dur = 2 + Math.random() * 1.8;
    const delay = Math.random() * 0.7;
    el.style.cssText = `left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};animation-duration:${dur}s;animation-delay:${delay}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay + 0.5) * 1000);
  }
}

// ── Dispatch render ──
function renderSlide(idx) {
  const s = SLIDES[idx];
  if (s.type === 'intro')  renderIntro();
  else if (s.type === 'stats')  renderStats(s);
  else if (s.type === 'quote')  renderQuote(s);
  else if (s.type === 'video')  renderVideo();
  else if (s.type === 'gift')   renderGift();
}

// ══════════════════════════════════════════════════════
//  SWIPE — pointer events (funciona en todo el slide)
// ══════════════════════════════════════════════════════
let ptStart = null, ptLast = null, ptTime = 0, dragging = false;
const SWIPE_THRESHOLD = 50, VEL_THRESHOLD = 0.3;

function onPtrDown(e) {
  // Evita interferir si está tocando el video o el botón de audio
  if (e.target.closest('video') || e.target.closest('#audio-btn')) return;
  
  // Registra el inicio del toque o clic para el swipe
  const t = e.touches ? e.touches[0] : e;
  ptStart = { x: t.clientX, y: t.clientY };
  ptLast  = { x: t.clientX, y: t.clientY };
  ptTime  = Date.now();
  dragging = false;
  paused = true;
}

function onPtrMove(e) {
  if (!ptStart) return;
  const t = e.touches ? e.touches[0] : e;
  const dy = t.clientY - ptStart.y;
  const dx = t.clientX - ptStart.x;
  if (Math.abs(dy) > 8) { dragging = true; e.preventDefault(); }
  ptLast = { x: t.clientX, y: t.clientY };
}

function onPtrUp(e) {
  // --- 1. EL TRUCO DEL AUDIO (SOLO ARRANCA AL SOLTAR EL DEDO) ---
  const audio = document.getElementById('audio');
  if (audio && audio.paused && !audioPlaying) {
    audio.play().then(() => {
      audioPlaying = true;
      const btn = document.getElementById('audio-btn');
      if (btn) btn.textContent = '⏸';
    }).catch(() => console.log("Aún bloqueado por el navegador"));
  }

  // --- 2. LÓGICA DE NAVEGACIÓN ---
  if (!ptStart) return;
  const t = e.changedTouches ? e.changedTouches[0] : e;
  const dy = t.clientY - ptStart.y;
  const dx = t.clientX - ptStart.x;
  const dt = (Date.now() - ptTime) / 1000 || .001;
  const vy = dy / dt / 1000; // px/ms → aproximado
  const isGiftSlide = SLIDES[cur].type === 'gift';
  const isSus = showSuspense;

  if (dragging && Math.abs(dy) > Math.abs(dx)) {
    // swipe vertical
    if (dy < -SWIPE_THRESHOLD || vy < -VEL_THRESHOLD) {
      if (!isGiftSlide && !isSus) advance();
    } else if (dy > SWIPE_THRESHOLD || vy > VEL_THRESHOLD) {
      if (!isSus) back();
    }
  } else if (!dragging) {
    // tap lateral
    if (!isSus && !isGiftSlide) {
      const w = window.innerWidth;
      if (t.clientX < w * 0.33) back();
      else if (t.clientX > w * 0.67) advance();
    }
  }

  ptStart = null; dragging = false;
  
  // --- 3. RETOMAR TIMER ---
  setTimeout(() => {
    if (SLIDES[cur].type !== 'gift' && SLIDES[cur].type !== 'video' && !showSuspense) { 
      paused = false; 
      startTimer(); 
    }
  }, 300);
}
// registrar en el wrapper con passive:false para poder prevenir scroll
const wrap = document.getElementById('slides-wrapper');
wrap.addEventListener('touchstart', onPtrDown, { passive: true });
wrap.addEventListener('touchmove',  onPtrMove, { passive: false });
wrap.addEventListener('touchend',   onPtrUp,   { passive: true });
wrap.addEventListener('mousedown',  onPtrDown);
wrap.addEventListener('mousemove',  onPtrMove);
wrap.addEventListener('mouseup',    onPtrUp);

// ══════════════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════════════
function toggleAudio() {
  const a = document.getElementById('audio');
  const btn = document.getElementById('audio-btn');
  if (audioPlaying) { a.pause(); btn.textContent = '▶'; }
  else { a.play().catch(()=>{}); btn.textContent = '⏸'; }
  audioPlaying = !audioPlaying;
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
buildProgressBar();
renderSlide(0);
startTimer();
document.getElementById('slide-num').textContent = `1 / ${TOTAL}`;
</script>
